name: Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare backend test env file
        shell: bash
        run: |
          if [ -z "$TEST_DATABASE_URL" ]; then
            echo "TEST_DATABASE_URL is required for backend integration/e2e tests."
            exit 1
          fi

          cat > apps/backend/.env.test <<EOF
          DATABASE_URL="$TEST_DATABASE_URL"
          TEST_DB_SAFE="true"
          NODE_ENV="test"
          EOF

      - name: Run backend unit tests
        run: pnpm --filter backend test:unit

      - name: Run backend integration tests
        run: pnpm --filter backend test:integration

      - name: Run backend e2e tests
        run: pnpm --filter backend test:e2e

      - name: Install Playwright browsers
        run: pnpm playwright:install

      - name: Run UI e2e tests (Playwright)
        run: pnpm turbo run test:e2e --filter=portal-e2e --filter=admin-e2e

      - name: Upload Playwright report (portal)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-portal
          path: apps/portal-e2e/playwright-report/
          retention-days: 14

      - name: Upload Playwright report (admin)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-admin
          path: apps/admin-e2e/playwright-report/
          retention-days: 14
