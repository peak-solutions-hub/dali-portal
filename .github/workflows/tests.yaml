name: Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: test-supabase-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-supabase-service-role-key
      SUPABASE_JWT_SECRET: test-supabase-jwt-secret
      TEST_DATABASE_URL: ${{ vars.TEST_DATABASE_URL }}
      TURNSTILE_SECRET_KEY: test-turnstile-secret-key
      RESEND_API_KEY: test-resend-api-key

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure origin/main ref is available for affected filters
        run: git fetch origin main --depth=1

      - name: Detect changed paths for UI E2E suites
        id: detect_ui_e2e_changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.base_ref }}"
            git fetch origin "${{ github.base_ref }}" --depth=1
          else
            BASE_REF="${{ github.event.before }}"
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE_REF"...HEAD)"
          echo "Changed files:"
          echo "$CHANGED_FILES"

          should_run_admin=false
          should_run_portal=false
          should_run_backend_e2e=false

          if echo "$CHANGED_FILES" | grep -E '^(apps/backend/|packages/shared/|packages/playwright-utils/|apps/admin/|apps/admin-e2e/|package.json|pnpm-lock.yaml|turbo.json)' >/dev/null; then
            should_run_admin=true
          fi

          if echo "$CHANGED_FILES" | grep -E '^(apps/backend/|packages/shared/|packages/playwright-utils/|apps/portal/|apps/portal-e2e/|package.json|pnpm-lock.yaml|turbo.json)' >/dev/null; then
            should_run_portal=true
          fi

          if echo "$CHANGED_FILES" | grep -E '^(apps/backend/|packages/shared/|package.json|pnpm-lock.yaml|turbo.json)' >/dev/null; then
            should_run_backend_e2e=true
          fi

          echo "run_admin_e2e=$should_run_admin" >> "$GITHUB_OUTPUT"
          echo "run_portal_e2e=$should_run_portal" >> "$GITHUB_OUTPUT"
          echo "run_backend_e2e=$should_run_backend_e2e" >> "$GITHUB_OUTPUT"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages needed by e2e tests
        run: pnpm --filter @repo/playwright-utils build

      - name: Prepare backend test env file
        id: prepare_backend_env
        shell: bash
        run: |
          if [ -z "$TEST_DATABASE_URL" ]; then
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "TEST_DATABASE_URL is unavailable in this PR context. Skipping backend integration tests."
              echo "has_test_db=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "TEST_DATABASE_URL is required for backend integration tests."
            exit 1
          fi

          cat > apps/backend/.env.test <<EOF
          DATABASE_URL="$TEST_DATABASE_URL"
          NODE_ENV="test"
          PORT="8080"
          SUPABASE_URL="$SUPABASE_URL"
          SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
          SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY"
          SUPABASE_JWT_SECRET="$SUPABASE_JWT_SECRET"
          TURNSTILE_SECRET_KEY="$TURNSTILE_SECRET_KEY"
          RESEND_API_KEY="$RESEND_API_KEY"
          EOF
          echo "has_test_db=true" >> "$GITHUB_OUTPUT"

      - name: Prepare backend test Prisma client once
        if: steps.prepare_backend_env.outputs.has_test_db == 'true'
        run: pnpm --filter backend run db:test:prepare

      - name: Run affected unit tests
        run: pnpm run test:affected:unit

      - name: Run affected integration tests
        if: steps.prepare_backend_env.outputs.has_test_db == 'true'
        run: pnpm run test:affected:integration

      - name: Run affected backend e2e tests
        if: steps.prepare_backend_env.outputs.has_test_db == 'true' && steps.detect_ui_e2e_changes.outputs.run_backend_e2e == 'true'
        run: pnpm run test:backend:e2e:affected

      - name: Note skipped backend e2e tests
        if: steps.prepare_backend_env.outputs.has_test_db == 'true' && steps.detect_ui_e2e_changes.outputs.run_backend_e2e != 'true'
        run: echo "Skipped backend e2e because no backend-impacting changes were detected."

      - name: Note skipped backend DB tests
        if: steps.prepare_backend_env.outputs.has_test_db != 'true'
        run: echo "Skipped affected integration because TEST_DATABASE_URL is not available in this workflow context."

      - name: Install Playwright browsers
        run: pnpm playwright:install

      - name: Run affected admin e2e tests (Playwright)
        if: steps.prepare_backend_env.outputs.has_test_db == 'true' && steps.detect_ui_e2e_changes.outputs.run_admin_e2e == 'true'
        run: pnpm run test:e2e:admin:affected

      - name: Run affected portal e2e tests (Playwright)
        if: steps.prepare_backend_env.outputs.has_test_db == 'true' && steps.detect_ui_e2e_changes.outputs.run_portal_e2e == 'true'
        run: pnpm run test:e2e:portal:affected

      - name: Note skipped admin UI e2e tests
        if: steps.prepare_backend_env.outputs.has_test_db == 'true' && steps.detect_ui_e2e_changes.outputs.run_admin_e2e != 'true'
        run: echo "Skipped admin UI e2e because no admin-impacting changes were detected."

      - name: Note skipped portal UI e2e tests
        if: steps.prepare_backend_env.outputs.has_test_db == 'true' && steps.detect_ui_e2e_changes.outputs.run_portal_e2e != 'true'
        run: echo "Skipped portal UI e2e because no portal-impacting changes were detected."

      - name: Note skipped UI e2e tests
        if: steps.prepare_backend_env.outputs.has_test_db != 'true'
        run: echo "Skipped affected UI e2e because TEST_DATABASE_URL is not available in this workflow context."

      - name: Upload Playwright report (portal)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-portal
          path: apps/portal-e2e/playwright-report/
          retention-days: 14

      - name: Upload Playwright report (admin)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-admin
          path: apps/admin-e2e/playwright-report/
          retention-days: 14
